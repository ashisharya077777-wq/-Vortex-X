<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VORTEXX Sign Up</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#050b14;
color:white;
padding:20px;
}

.card{
width:100%;
max-width:400px;
background:#0d1626;
border:1px solid #00ffcc;
border-radius:20px;
padding:30px;
box-shadow:0 0 25px rgba(0,255,204,.25);
}

.logo{
text-align:center;
font-size:42px;
font-weight:bold;
color:#00ffcc;
text-shadow:0 0 15px #00ffcc;
margin-bottom:15px;
}

h2{
text-align:center;
margin-bottom:10px;
}

.sub{
text-align:center;
color:#bdbdbd;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border:none;
border-radius:10px;
background:#08111f;
color:white;
}

.btn{
display:block;
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
margin-bottom:12px;
text-decoration:none;
text-align:center;
}

.signup{
background:#00ffcc;
color:black;
}

.login{
background:transparent;
border:1px solid #00ffcc;
color:#00ffcc;
}

.footer{
text-align:center;
margin-top:15px;
font-size:13px;
color:#9e9e9e;
}

#error{
color:red;
text-align:center;
margin-bottom:12px;
}
</style>
</head>

<body>

<div class="card">

<div class="logo">VORTEXX</div>

<h2>Create Account</h2>

<div class="sub">
Join VORTEXX Analytics Platform
</div>

<p id="error"></p>

<input type="text" id="name" placeholder="Full Name">

<input type="email" id="email" placeholder="Email Address">

<input type="password" id="password" placeholder="Password">

<input type="password" id="confirm" placeholder="Confirm Password">

<button class="btn signup" onclick="signupUser()">
CREATE ACCOUNT
</button>

<a href="login.html" class="btn login">
BACK TO LOGIN
</a>

<div class="footer">
Premium Dragon Tiger & Baccarat Analytics Platform
</div>

</div>

<script>
function signupUser(){

let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let password=document.getElementById("password").value;
let confirm=document.getElementById("confirm").value;
let error=document.getElementById("error");

if(name==""){
error.innerHTML="❌ Enter your name";
return;
}

if(email==""){
error.innerHTML="❌ Enter your email";
return;
}

if(password==""){
error.innerHTML="❌ Enter password";
return;
}

if(password!==confirm){
error.innerHTML="❌ Passwords do not match";
return;
}

alert("✅ Account Created Successfully");

window
