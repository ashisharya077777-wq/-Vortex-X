<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Baccarat Dashboard</title>

<style>
body{
background:#050b14;
font-family:Arial;
color:white;
padding:20px;
margin:0;
}

.logo{
font-size:40px;
font-weight:bold;
color:#00ffcc;
text-align:center;
margin:20px 0;
}

.card{
background:#0d1626;
border:1px solid #00ffcc;
border-radius:20px;
padding:20px;
margin-bottom:20px;
box-shadow:0 0 20px rgba(0,255,204,.2);
}

h2{
margin-top:0;
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#08111f;
color:white;
}

.btn{
display:block;
text-align:center;
background:#00ffcc;
color:black;
padding:14px;
border-radius:12px;
text-decoration:none;
font-weight:bold;
margin-top:15px;
}
</style>
</head>

<body>

<div class="logo">🎴 BACCARAT</div>

<div class="card">
<h2>Session Tracker</h2>
<p>Total Wins: 0</p>
<p>Total Losses: 0</p>
</div>

<div class="card">
<h2>Big Road Notes</h2>
<textarea rows="6" placeholder="Write Baccarat notes here..."></textarea>
</div>

<div class="card">
<h2>Statistics</h2>
<p>Player Win Rate: --%</p>
<p>Banker Win Rate: --%</p>
<p>Tie Rate: --%</p>
</div>

<a href="index.html" class="btn">BACK TO HOME</a>

</body>
</html>
