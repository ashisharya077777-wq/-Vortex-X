<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VORTEX X - Dragon Tiger Pro</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050b14;
color:white;
padding:20px;
}

.logo{
text-align:center;
font-size:42px;
font-weight:bold;
color:#00ffcc;
text-shadow:0 0 20px #00ffcc;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#aaa;
margin-bottom:25px;
}

.card{
background:#0b1626;
border:1px solid #00ffcc;
border-radius:20px;
padding:20px;
margin-bottom:20px;
box-shadow:0 0 20px rgba(0,255,204,.2);
}

.stats{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
}

.stat{
text-align:center;
padding:15px;
border-radius:15px;
background:#08111f;
}

.stat h3{
font-size:18px;
margin-bottom:8px;
}

.stat span{
font-size:24px;
font-weight:bold;
}

.dragon{
border:1px solid #00ffcc;
}

.tiger{
border:1px solid #ff5757;
}

.tie{
border:1px solid #ffd166;
}

.buttons{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
margin-top:15px;
}

button{
padding:15px;
border:none;
border-radius:12px;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

.btn-dragon{
background:#00ffcc;
color:black;
}

.btn-tiger{
background:#ff5757;
color:white;
}

.btn-tie{
background:#ffd166;
color:black;
}

.history{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-top:15px;
}

.ball{
width:40px;
height:40px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.d{
background:#00ffcc;
color:black;
}

.t{
background:#ff5757;
}

.i{
background:#ffd166;
color:black;
}

.info{
line-height:2;
font-size:18px;
}

.reset{
width:100%;
background:#ffffff;
color:black;
margin-top:15px;
}

.back{
display:block;
text-align:center;
background:#00ffcc;
color:black;
text-decoration:none;
padding:15px;
border-radius:12px;
font-weight:bold;
margin-top:15px;
}
</style>
</head>

<body>

<div class="logo">VORTEX X</div>
<div class="subtitle">Dragon Tiger Pro Dashboard</div>

<div class="card">

<div class="stats">

<div class="stat dragon">
<h3>🐉 Dragon</h3>
<span id="dragonCount">0</span>
</div>

<div class="stat tiger">
<h3>🐯 Tiger</h3>
<span id="tigerCount">0</span>
</div>

<div class="stat tie">
<h3>⚪ Tie</h3>
<span id="tieCount">0</span>
</div>

</div>

<div class="buttons">

<button class="btn-dragon" onclick="addResult('D')">
DRAGON
</button>

<button class="btn-tiger" onclick="addResult('T')">
TIGER
</button>

<button class="btn-tie" onclick="addResult('I')">
TIE
</button>

</div>

</div>
<div class="card">
<h2>📜 Round History</h2>
<div id="history" class="history"></div>
</div>

<div class="card">
<h2>📊 Analytics</h2>

<div class="info">
<p>Total Rounds: <span id="totalRounds">0</span></p>
<p>Dragon Win %: <span id="dragonRate">0%</span></p>
<p>Tiger Win %: <span id="tigerRate">0%</span></p>
<p>Tie Rate: <span id="tieRate">0%</span></p>

<p>Current Streak:
<span id="currentStreak">0</span>
</p>

<p>Trend:
<span id="trend">Neutral</span>
</p>

<p>Probability:
<span id="probability">Waiting...</span>
</p>
</div>

<button class="reset" onclick="resetData()">
RESET SESSION
</button>

</div>

<a href="dashboard.html" class="back">
⬅ BACK TO DASHBOARD
</a>

<script>

let dragon=0;
let tiger=0;
let tie=0;

let history=[];

function addResult(type){

history.push(type);

if(type==="D") dragon++;
if(type==="T") tiger++;
if(type==="I") tie++;

updateUI();

}

function updateUI(){

document.getElementById("dragonCount").innerText=dragon;
document.getElementById("tigerCount").innerText=tiger;
document.getElementById("tieCount").innerText=tie;

let total=dragon+tiger+tie;

document.getElementById("totalRounds").innerText=total;

document.getElementById("dragonRate").innerText=
total?((dragon/total)*100).toFixed(1)+"%":"0%";

document.getElementById("tigerRate").innerText=
total?((tiger/total)*100).toFixed(1)+"%":"0%";

document.getElementById("tieRate").innerText=
total?((tie/total)*100).toFixed(1)+"%":"0%";

let historyBox=document.getElementById("history");
historyBox.innerHTML="";

history.slice().reverse().forEach(r=>{

let div=document.createElement("div");

if(r==="D"){
div.className="ball d";
div.innerText="D";
}

if(r==="T"){
div.className="ball t";
div.innerText="T";
}

if(r==="I"){
div.className="ball i";
div.innerText="T";
}

historyBox.appendChild(div);

});

updateTrend();
updateStreak();

}

function updateTrend(){

let trend="Neutral";
let probability="50% / 50%";

if(dragon>tiger){
trend="🐉 Dragon Dominant";
probability="Dragon 55% | Tiger 45%";
}

if(tiger>dragon){
trend="🐯 Tiger Dominant";
probability="Tiger 55% | Dragon 45%";
}

document.getElementById("trend").innerText=trend;
document.getElementById("probability").innerText=probability;

}

function updateStreak(){

if(history.length===0){
document.getElementById("currentStreak").innerText="0";
return;
}

let last=history[history.length-1];
let streak=1;

for(let i=history.length-2;i>=0;i--){

if(history[i]===last){
streak++;
}else{
break;
}

}

document.getElementById("currentStreak").innerText=
last+" x"+streak;

}

function resetData(){

dragon=0;
tiger=0;
tie=0;
history=[];

updateUI();

}

</script>

</body>
</html>
