 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dragon Tiger Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050b14;
color:white;
font-family:'Poppins',sans-serif;
padding:18px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.back{
width:52px;
height:52px;
border-radius:50%;
background:#0d1624;
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;
color:white;
font-size:24px;
border:1px solid rgba(0,255,255,.15);
}

.menu{
width:52px;
height:52px;
border-radius:50%;
background:#0d1624;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
border:1px solid rgba(0,255,255,.15);
}

.logo{
text-align:center;
font-family:'Orbitron',sans-serif;
font-size:42px;
font-weight:800;
color:#00f5ff;

text-shadow:
0 0 10px #00f5ff,
0 0 25px #00f5ff,
0 0 50px #00f5ff;
}

.subtitle{
text-align:center;
margin-top:8px;
font-size:13px;
letter-spacing:2px;
color:#7ba4c0;
}

.stats-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-top:25px;
}

.stat-card{
background:#0b1422;
border-radius:22px;
padding:18px;
border:1px solid rgba(255,255,255,.05);
}

.stat-title{
font-size:13px;
color:#8ea0b5;
}

.stat-value{
font-size:28px;
font-weight:700;
margin-top:10px;
}

.profit{
color:#00ff66;
}

.loss{
color:#ff4d4d;
}

.live{
color:#00f5ff;
}

.section{
margin-top:25px;
}
  .action-grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:12px;
margin-top:25px;
}

.action-btn{
height:120px;
border:none;
border-radius:24px;
color:white;
font-size:22px;
font-weight:700;
cursor:pointer;
}

.dragon-btn{
background:linear-gradient(135deg,#0066ff,#00c3ff);
box-shadow:0 0 30px rgba(0,180,255,.25);
}

.tie-btn{
background:linear-gradient(135deg,#00c853,#00ff99);
box-shadow:0 0 30px rgba(0,255,140,.25);
}

.tiger-btn{
background:linear-gradient(135deg,#ff5722,#ff9800);
box-shadow:0 0 30px rgba(255,120,0,.25);
}

.history{
margin-top:25px;
background:#0b1422;
padding:18px;
border-radius:22px;
border:1px solid rgba(255,255,255,.05);
}

.history-title{
font-size:18px;
font-weight:700;
margin-bottom:12px;
}

.history-list{
display:flex;
flex-wrap:wrap;
gap:8px;
}

.ball{
width:34px;
height:34px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
font-weight:700;
}

.ball-dragon{
background:#0099ff;
}

.ball-tiger{
background:#ff6d00;
}

.ball-tie{
background:#00c853;
}
</style>
</head>

<body>

<div class="topbar">
<a href="dashboard.html" class="back">←</a>
<div class="menu">☰</div>
</div>

<div class="logo">
DRAGON TIGER PRO
</div>

<div class="subtitle">
REAL TIME SESSION ANALYTICS
</div>

<div class="stats-grid">

<div class="stat-card">
<div class="stat-title">💰 BANKROLL</div>
<div class="stat-value" id="bankroll">₹0</div>
</div>

<div class="stat-card">
<div class="stat-title">🎯 TARGET</div>
<div class="stat-value" id="target">₹0</div>
</div>

<div class="stat-card">
<div class="stat-title">📈 PROFIT</div>
<div class="stat-value profit" id="profit">₹0</div>
</div>

<div class="stat-card">
<div class="stat-title">📉 LOSS</div>
<div class="stat-value loss" id="loss">₹0</div>
</div>

<div class="stat-card">
<div class="stat-title">🔥 STREAK</div>
<div class="stat-value" id="streak">0</div>
</div>

<div class="stat-card">
<div class="stat-title">🟢 STATUS</div>
<div class="stat-value live">LIVE</div>
</div>

</div>

<div class="action-grid">

<button class="action-btn dragon-btn">
🐉 DRAGON
</button>

<button class="action-btn tie-btn">
🤝 TIE
</button>

<button class="action-btn tiger-btn">
🐯 TIGER
</button>

</div>

<div class="history">

<div class="history-title">
ROUND HISTORY
</div>

<div class="history-list" id="historyList">
</div>

</div>
<div class="section">

<div class="stat-card">

<div class="stat-title">
📊 SESSION PROBABILITY
</div>

<div class="stat-value" id="probability">
0%
</div>

</div>

</div>

<div class="section">

<div class="stat-card">

<div class="stat-title">
🔮 NEXT TREND
</div>

<div class="stat-value" id="nextTrend">
WAITING...
</div>

</div>

</div>

<script>

let bankroll =
localStorage.getItem("bankroll") || 0;

let target =
localStorage.getItem("target") || 0;

document.getElementById("bankroll").innerText =
"₹" + bankroll;

document.getElementById("target").innerText =
"₹" + target;

let dragon = 0;
let tiger = 0;
let tie = 0;

let streak = 0;
let lastWinner = "";

const historyList =
document.getElementById("historyList");

function addHistory(text,cls){

const ball =
document.createElement("div");

ball.className =
"ball " + cls;

ball.innerText = text;

historyList.prepend(ball);

}

function updateStats(){

let total =
dragon + tiger + tie;

if(total===0){
return;
}

let dragonPercent =
((dragon/total)*100).toFixed(1);

let tigerPercent =
((tiger/total)*100).toFixed(1);

if(dragonPercent > tigerPercent){

document.getElementById(
"probability"
).innerText =
"🐉 " + dragonPercent + "%";

document.getElementById(
"nextTrend"
).innerText =
"🐉 DRAGON TREND";

}else{

document.getElementById(
"probability"
).innerText =
"🐯 " + tigerPercent + "%";

document.getElementById(
"nextTrend"
).innerText =
"🐯 TIGER TREND";

}

document.getElementById(
"streak"
).innerText =
streak;

}

document.querySelector(
".dragon-btn"
).onclick = ()=>{

dragon++;

if(lastWinner==="DRAGON"){
streak++;
}else{
streak=1;
lastWinner="DRAGON";
}

addHistory(
"D",
"ball-dragon"
);

updateStats();

};

document.querySelector(
".tiger-btn"
).onclick = ()=>{

tiger++;

if(lastWinner==="TIGER"){
streak++;
}else{
streak=1;
lastWinner="TIGER";
}

addHistory(
"T",
"ball-tiger"
);

updateStats();

};

document.querySelector(
".tie-btn"
).onclick = ()=>{

tie++;

addHistory(
"T",
"ball-tie"
);

updateStats();

};

</script>

</body>
</html>
